# taskflow (formerly hopewell) as a Flotilla plugin.
#
# When a project runs `flotilla install taskflow`, the Flotilla CLI:
#   1. pip-installs taskflow (handled by Flotilla's resolver)
#   2. composes everything declared under `contributes:` into the
#      project's .claude/ directory
#   3. runs the `on_install` steps once to wire git hooks + initialise
#      the local .taskflow/ store.
#
# See https://github.com/ocgully/Hopewell for the underlying tool.

name: taskflow
aliases:
  - hopewell   # legacy plugin name; resolves to this manifest
version: 0.17.0
description: Work ledger — typed nodes, flow network, release scoring
homepage: https://github.com/ocgully/Hopewell
license: Apache-2.0
kind: tool

python_package:
  name: taskflow
  extras: []

contributes:
  agents: plugin/agents/
  commands: plugin/commands/
  hooks: plugin/hooks.yaml

# Run once on install to wire git hooks + init the store. Each step is
# best-effort; failure does not abort the install (the user can rerun
# manually).
on_install:
  - taskflow hooks install --full --quiet

tags:
  - work-tracking
  - ai-agents
  - ledger
  - flow-network
